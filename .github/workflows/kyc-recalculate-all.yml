name: Recalculate KYC Progress

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "Base URL of the aml-svc worker (e.g. https://aml-svc.acct.workers.dev or https://aml-svc-prod.acct.workers.dev)"
        required: true
        type: string
      organization_id:
        description: "Organization ID to limit scope (leave blank for all orgs)"
        required: false
        type: string
      batch_size:
        description: "Clients processed per request (1–50, default 20)"
        required: false
        type: number
        default: 20

permissions:
  contents: read

concurrency:
  # Serialize by URL so the same worker is never double-processed
  group: kyc-recalculate-${{ github.event.inputs.api_url }}
  cancel-in-progress: false

jobs:
  recalculate:
    name: Recalculate KYC (${{ github.event.inputs.api_url }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Recalculate KYC progress
        env:
          API_URL: ${{ github.event.inputs.api_url }}
          INTERNAL_SERVICE_SECRET: ${{ secrets.INTERNAL_SERVICE_SECRET }}
          ORGANIZATION_ID: ${{ github.event.inputs.organization_id }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
        run: node scripts/kyc-recalculate-all.mjs
        working-directory: aml-svc

      - name: Write job summary
        if: always()
        run: |
          echo "## KYC Progress Recalculation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| API URL | \`${{ github.event.inputs.api_url }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Organization | \`${{ github.event.inputs.organization_id || 'all' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch size | \`${{ github.event.inputs.batch_size || '20' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
