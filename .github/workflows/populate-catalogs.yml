name: Populate Reference Data

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
          - preview
        default: dev

permissions:
  contents: read

concurrency:
  group: populate-reference-data-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  populate:
    name: Populate All Reference Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine wrangler config
        id: config
        run: |
          case "${{ github.event.inputs.environment }}" in
            prod)
              echo "config=wrangler.prod.jsonc" >> $GITHUB_OUTPUT
              ;;
            preview)
              echo "config=wrangler.preview.jsonc" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "config=wrangler.jsonc" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Generate SQL dump files
        run: node scripts/populate/generate-sql.mjs

      - name: Import catalogs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler d1 execute DB --config ${{ steps.config.outputs.config }} --remote --file scripts/populate/sql/catalogs.sql

      - name: Import reference data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler d1 execute DB --config ${{ steps.config.outputs.config }} --remote --file scripts/populate/sql/reference-data.sql

      - name: Generate Summary
        if: always()
        run: |
          echo "## Reference Data Population Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Config | \`${{ steps.config.outputs.config }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Data Populated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **All Catalogs** (including zip-codes + cfdi-product-services)" >> $GITHUB_STEP_SUMMARY
          echo "- **Alert Rules & Configs**" >> $GITHUB_STEP_SUMMARY
          echo "- **CFDI-PLD Mappings**" >> $GITHUB_STEP_SUMMARY
          echo "- **UMA Values**" >> $GITHUB_STEP_SUMMARY
